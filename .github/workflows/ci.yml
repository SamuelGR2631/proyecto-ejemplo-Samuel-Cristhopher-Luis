name: CI

on:
  push:
    branches:
      - main
      - 'feature/rama-samuel-gonzalez'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Lint HTML (optional)
        run: |
          if command -v npm >/dev/null 2>&1 && grep -q '"htmlhint"' package.json 2>/dev/null; then
            npm run htmlhint || true
          else
            echo "No htmlhint configured; skipping"
          fi

      - name: Run tests (if any)
        run: |
          if [ -f package.json ]; then npm test || true; fi

      - name: Archive simple artifact (index.html)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-files
          path: |
            index.html
            || true
